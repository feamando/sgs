<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radiance Prisma — See How Meaning Is Rendered</title>
<meta name="description" content="Interactive visualization of Semantic Gaussian Splatting. Watch sentences compose through alpha-compositing.">
<meta property="og:title" content="Radiance Prisma">
<meta property="og:description" content="See how meaning is rendered — interactive SGS visualization">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='0%25' stop-color='%23F4A300' stop-opacity='0.9'/><stop offset='50%25' stop-color='%23F4A300' stop-opacity='0.35'/><stop offset='100%25' stop-color='%23F4A300' stop-opacity='0'/></radialGradient></defs><ellipse cx='40' cy='40' rx='36' ry='36' fill='url(%23g)'/><text x='40' y='58' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='56' fill='white'>R</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Source+Serif+4:wght@300;400;500&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: 'Inter', sans-serif; overflow-x: hidden; }

  /* Header */
  .header { padding: 16px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #151520; }
  .header svg { width: 22px; height: 22px; }
  .header .title { font-size: 13px; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; color: #ccc; }
  .header .subtitle { margin-left: auto; font-size: 10px; color: #444; }

  /* Layout */
  .main { display: grid; grid-template-columns: 1fr 360px; grid-template-rows: auto 1fr; height: calc(100vh - 53px); }

  /* Sentence selector */
  .selector { grid-column: 1 / -1; padding: 14px 24px; border-bottom: 1px solid #151520; display: flex; align-items: center; gap: 12px; }
  .selector select { background: #12121a; border: 1px solid #1e1e2a; color: #ccc; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-family: 'Source Serif 4', serif; flex: 1; max-width: 600px; cursor: pointer; }
  .selector select:focus { outline: none; border-color: #F4A300; }
  .selector label { font-size: 11px; color: #555; letter-spacing: 1px; text-transform: uppercase; }

  /* 3D View */
  .viewport { position: relative; overflow: hidden; background: #08080e; }
  .viewport canvas { width: 100%; height: 100%; }
  .viewport .hint { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #333; }

  /* Side panel */
  .panel { background: #0c0c14; border-left: 1px solid #151520; overflow-y: auto; padding: 0; }
  .panel-section { padding: 16px; border-bottom: 1px solid #151520; }
  .panel-section h3 { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }

  /* Word list */
  .word-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #0f0f18; }
  .word-row:last-child { border-bottom: none; }
  .word-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .word-text { font-family: 'Source Serif 4', serif; font-size: 14px; color: #ccc; flex: 1; }
  .word-weight { font-size: 11px; color: #888; font-variant-numeric: tabular-nums; min-width: 42px; text-align: right; }
  .word-bar-wrap { width: 60px; height: 6px; background: #151520; border-radius: 3px; overflow: hidden; }
  .word-bar { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  /* Transmittance bar */
  .transmittance { display: flex; align-items: center; gap: 8px; }
  .transmittance-bar { flex: 1; height: 8px; background: #151520; border-radius: 4px; overflow: hidden; }
  .transmittance-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #F4A300, #FF6B6B); transition: width 0.4s ease; }
  .transmittance-label { font-size: 11px; color: #666; min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }

  /* Stats */
  .stat-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; }
  .stat-label { color: #555; }
  .stat-value { color: #aaa; font-variant-numeric: tabular-nums; }

  /* Animation controls */
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls button { background: #16161e; border: 1px solid #1e1e2a; color: #aaa; padding: 6px 14px; border-radius: 6px; font-size: 11px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
  .controls button:hover { background: #1e1e2a; color: #ddd; border-color: #F4A300; }
  .controls button.active { background: rgba(244,163,0,0.1); border-color: #F4A300; color: #F4A300; }
  .step-label { font-size: 11px; color: #555; margin-left: auto; }

  /* Loading state */
  .loading { display: flex; align-items: center; justify-content: center; height: 100%; color: #444; font-size: 14px; }

  /* About link */
  .about-link { font-size: 10px; color: #333; text-decoration: none; }
  .about-link:hover { color: #F4A300; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <svg viewBox="0 0 80 80"><defs><radialGradient id="hg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#F4A300" stop-opacity="0.9"/><stop offset="50%" stop-color="#F4A300" stop-opacity="0.35"/><stop offset="100%" stop-color="#F4A300" stop-opacity="0"/></radialGradient></defs><ellipse cx="40" cy="40" rx="36" ry="36" fill="url(#hg)"/><text x="40" y="57" text-anchor="middle" font-family="Inter,sans-serif" font-weight="800" font-size="52" fill="white">R</text></svg>
  <div class="title">Prisma</div>
  <div class="subtitle"><a href="https://github.com/feamando/sgs" class="about-link">Radiance Labs · GitHub</a></div>
</div>

<!-- Main layout -->
<div class="main">

  <!-- Sentence selector -->
  <div class="selector">
    <label>Sentence</label>
    <select id="sentence-select">
      <option value="" disabled>Loading examples...</option>
    </select>
  </div>

  <!-- 3D Viewport -->
  <div class="viewport" id="viewport">
    <div class="loading" id="loading-msg">Loading Three.js...</div>
    <div class="hint">Click + drag to orbit · Scroll to zoom</div>
  </div>

  <!-- Side Panel -->
  <div class="panel">
    <!-- Animation controls -->
    <div class="panel-section">
      <h3>Rendering</h3>
      <div class="controls">
        <button id="btn-play">▶ Play</button>
        <button id="btn-step">→ Step</button>
        <button id="btn-reset">↺ Reset</button>
        <div class="step-label" id="step-label">Ready</div>
      </div>
    </div>

    <!-- Transmittance -->
    <div class="panel-section">
      <h3>Transmittance</h3>
      <div class="transmittance">
        <div class="transmittance-bar"><div class="transmittance-fill" id="transmittance-fill" style="width:100%"></div></div>
        <div class="transmittance-label" id="transmittance-label">100%</div>
      </div>
    </div>

    <!-- Word weights -->
    <div class="panel-section">
      <h3>Word Weights</h3>
      <div id="word-list"></div>
    </div>

    <!-- Stats -->
    <div class="panel-section">
      <h3>Stats</h3>
      <div id="stats"></div>
    </div>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// ═══════════════════════════════════════
// Prisma App
// ═══════════════════════════════════════

let scene, camera, renderer, controls;
let gaussianMeshes = [];
let currentExample = null;
let animStep = -1; // -1 = not started, 0..n-1 = rendering word i, n = done

const WARM_COLORS = [
  [0.96, 0.64, 0.0],   // amber
  [1.0, 0.84, 0.0],    // gold
  [1.0, 0.42, 0.42],   // coral
  [1.0, 0.56, 0.64],   // rose
  [1.0, 0.80, 0.64],   // peach
];

// ─── THREE.JS SETUP ───

function initThree() {
  const container = document.getElementById('viewport');
  const w = container.clientWidth;
  const h = container.clientHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x08080e);

  camera = new THREE.PerspectiveCamera(50, w / h, 0.1, 100);
  camera.position.set(3, 2, 4);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  container.appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.target.set(0, 0, 0);

  // Ambient light
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
  dirLight.position.set(5, 5, 5);
  scene.add(dirLight);

  // Grid helper (subtle)
  const grid = new THREE.GridHelper(6, 12, 0x151520, 0x0f0f18);
  grid.position.y = -1.5;
  scene.add(grid);

  document.getElementById('loading-msg').style.display = 'none';

  window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  });

  animate();
}

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

// ─── GAUSSIAN RENDERING ───

function clearGaussians() {
  for (const m of gaussianMeshes) {
    scene.remove(m);
    m.geometry.dispose();
    m.material.dispose();
  }
  gaussianMeshes = [];
}

function addGaussian(pos, scale, color, alpha) {
  const geo = new THREE.SphereGeometry(1, 16, 12);
  const mat = new THREE.MeshPhysicalMaterial({
    color: new THREE.Color(color[0], color[1], color[2]),
    transparent: true,
    opacity: Math.max(0.05, alpha * 0.8),
    roughness: 0.8,
    metalness: 0.0,
    clearcoat: 0.3,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(pos[0], pos[1], pos[2]);
  mesh.scale.set(
    Math.max(0.05, scale[0]),
    Math.max(0.05, scale[1]),
    Math.max(0.05, scale[2]),
  );
  scene.add(mesh);
  gaussianMeshes.push(mesh);
  return mesh;
}

// ─── LOAD & DISPLAY ───

function displayExample(ex) {
  currentExample = ex;
  animStep = -1;
  clearGaussians();

  // Build word list UI
  const wordList = document.getElementById('word-list');
  wordList.innerHTML = '';
  const maxWeight = Math.max(...ex.rendering.weights, 0.01);

  for (let i = 0; i < ex.words.length; i++) {
    const color = ex.gaussians.colors[i] || WARM_COLORS[i % WARM_COLORS.length];
    const weight = ex.rendering.weights[i];
    const pct = (weight / maxWeight * 100).toFixed(0);

    const row = document.createElement('div');
    row.className = 'word-row';
    row.innerHTML = `
      <div class="word-dot" style="background:rgb(${(color[0]*255)|0},${(color[1]*255)|0},${(color[2]*255)|0});opacity:0.3;" id="dot-${i}"></div>
      <div class="word-text">${ex.words[i]}</div>
      <div class="word-weight" id="weight-${i}">—</div>
      <div class="word-bar-wrap"><div class="word-bar" id="bar-${i}" style="width:0%;background:rgb(${(color[0]*255)|0},${(color[1]*255)|0},${(color[2]*255)|0});"></div></div>
    `;
    wordList.appendChild(row);
  }

  // Stats
  document.getElementById('stats').innerHTML = `
    <div class="stat-row"><span class="stat-label">Tokens</span><span class="stat-value">${ex.stats.n_tokens}</span></div>
    <div class="stat-row"><span class="stat-label">Total weight</span><span class="stat-value">${ex.stats.total_weight.toFixed(3)}</span></div>
    <div class="stat-row"><span class="stat-label">Residual</span><span class="stat-value">${(ex.stats.residual_transmittance * 100).toFixed(1)}%</span></div>
    <div class="stat-row"><span class="stat-label">Top word</span><span class="stat-value" style="color:#F4A300;">${ex.stats.top_word}</span></div>
  `;

  // Reset transmittance
  document.getElementById('transmittance-fill').style.width = '100%';
  document.getElementById('transmittance-label').textContent = '100%';
  document.getElementById('step-label').textContent = 'Ready';

  // Center camera on the gaussians
  if (ex.gaussians.mu_3d.length > 0) {
    const center = ex.gaussians.mu_3d.reduce((a, b) => [a[0]+b[0], a[1]+b[1], a[2]+b[2]], [0,0,0]);
    center[0] /= ex.gaussians.mu_3d.length;
    center[1] /= ex.gaussians.mu_3d.length;
    center[2] /= ex.gaussians.mu_3d.length;
    controls.target.set(center[0], center[1], center[2]);
    camera.position.set(center[0]+3, center[1]+2, center[2]+4);
  }
}

function stepAnimation() {
  if (!currentExample) return;
  const ex = currentExample;
  animStep++;

  if (animStep >= ex.words.length) {
    document.getElementById('step-label').textContent = 'Done';
    return;
  }

  const i = animStep;
  const color = ex.gaussians.colors[i] || WARM_COLORS[i % WARM_COLORS.length];
  const weight = ex.rendering.weights[i];
  const maxWeight = Math.max(...ex.rendering.weights, 0.01);
  const T = ex.rendering.transmittance[i];

  // Add Gaussian to scene
  addGaussian(
    ex.gaussians.mu_3d[i],
    ex.gaussians.scale_3d[i],
    color,
    weight / maxWeight,
  );

  // Update UI
  document.getElementById(`dot-${i}`).style.opacity = '1';
  document.getElementById(`weight-${i}`).textContent = weight.toFixed(3);
  document.getElementById(`bar-${i}`).style.width = `${(weight / maxWeight * 100).toFixed(0)}%`;

  // Update transmittance
  const nextT = i < ex.words.length - 1 ? ex.rendering.transmittance[i+1] : T * (1 - ex.rendering.eff_opacity[i]);
  document.getElementById('transmittance-fill').style.width = `${(nextT * 100).toFixed(0)}%`;
  document.getElementById('transmittance-label').textContent = `${(nextT * 100).toFixed(0)}%`;

  document.getElementById('step-label').textContent = `${i+1}/${ex.words.length}: "${ex.words[i]}"`;
}

function playAnimation() {
  if (!currentExample) return;
  if (animStep >= currentExample.words.length - 1) resetAnimation();

  const interval = setInterval(() => {
    stepAnimation();
    if (animStep >= currentExample.words.length) clearInterval(interval);
  }, 400);
}

function resetAnimation() {
  if (!currentExample) return;
  displayExample(currentExample);
}

// ─── DATA LOADING ───

async function loadData() {
  try {
    const resp = await fetch('data/examples.json');
    if (!resp.ok) throw new Error('No data yet — run export_prisma_data.py first');
    const examples = await resp.json();

    const select = document.getElementById('sentence-select');
    select.innerHTML = '';
    examples.forEach((ex, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = ex.sentence;
      select.appendChild(opt);
    });

    select.addEventListener('change', () => {
      displayExample(examples[parseInt(select.value)]);
    });

    // Load first example
    if (examples.length > 0) {
      select.value = 0;
      displayExample(examples[0]);
    }
  } catch (e) {
    console.warn('Could not load examples:', e.message);
    // Load mock data for development
    loadMockData();
  }
}

function loadMockData() {
  const mock = {
    sentence: "The warm coffee sat on the table",
    words: ["the", "warm", "coffee", "sat", "on", "the", "table"],
    gaussians: {
      mu_3d: [[-1,0.2,0.5],[0.3,0.8,-0.2],[1.2,0.1,0.3],[0.5,-0.5,0.8],[-0.3,-0.2,-0.6],[0.8,0.5,0.1],[-0.5,-0.8,0.4]],
      scale_3d: [[0.2,0.15,0.18],[0.25,0.22,0.2],[0.35,0.3,0.28],[0.2,0.18,0.22],[0.15,0.12,0.14],[0.18,0.15,0.16],[0.3,0.25,0.28]],
      alpha: [0.45,0.52,0.61,0.48,0.42,0.44,0.55],
      colors: [[0.8,0.7,0.5],[0.9,0.4,0.3],[0.6,0.3,0.2],[0.4,0.5,0.7],[0.5,0.5,0.5],[0.8,0.7,0.5],[0.5,0.4,0.3]],
    },
    rendering: {
      kernel: [0.85,0.72,0.91,0.65,0.78,0.83,0.88],
      weights: [0.38,0.18,0.22,0.08,0.05,0.03,0.04],
      transmittance: [1.0,0.62,0.50,0.35,0.28,0.24,0.21],
      eff_opacity: [0.38,0.19,0.30,0.20,0.14,0.13,0.15],
    },
    stats: { total_weight: 0.98, residual_transmittance: 0.02, top_word: "the", n_tokens: 7 },
  };

  const select = document.getElementById('sentence-select');
  select.innerHTML = '<option value="0">The warm coffee sat on the table (mock data)</option>';
  displayExample(mock);
}

// ─── INIT ───

document.getElementById('btn-play').addEventListener('click', playAnimation);
document.getElementById('btn-step').addEventListener('click', stepAnimation);
document.getElementById('btn-reset').addEventListener('click', resetAnimation);

initThree();
loadData();
</script>
</body>
</html>
