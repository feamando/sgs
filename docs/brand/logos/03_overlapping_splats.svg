<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="s-amber" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F4A300" stop-opacity="0.92"/>
      <stop offset="35%" stop-color="#F4A300" stop-opacity="0.7"/>
      <stop offset="65%" stop-color="#F4A300" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F4A300" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s-gold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.88"/>
      <stop offset="35%" stop-color="#FFD700" stop-opacity="0.65"/>
      <stop offset="65%" stop-color="#FFD700" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s-coral" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.88"/>
      <stop offset="35%" stop-color="#FF6B6B" stop-opacity="0.62"/>
      <stop offset="65%" stop-color="#FF6B6B" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s-rose" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF8FA3" stop-opacity="0.85"/>
      <stop offset="35%" stop-color="#FF8FA3" stop-opacity="0.6"/>
      <stop offset="65%" stop-color="#FF8FA3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FF8FA3" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="s-peach" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFCBA4" stop-opacity="0.82"/>
      <stop offset="35%" stop-color="#FFCBA4" stop-opacity="0.55"/>
      <stop offset="65%" stop-color="#FFCBA4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFCBA4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="white"/>

  <!-- Five overlapping Gaussian splats in organic arrangement -->
  <!-- Largest, back layer -->
  <ellipse cx="185" cy="220" rx="105" ry="90" fill="url(#s-amber)" />

  <!-- Medium, offset right -->
  <ellipse cx="255" cy="175" rx="85" ry="80" fill="url(#s-gold)" />

  <!-- Medium-small, offset left-up -->
  <ellipse cx="150" cy="150" rx="78" ry="70" fill="url(#s-coral)" />

  <!-- Small, lower right -->
  <ellipse cx="270" cy="270" rx="70" ry="62" fill="url(#s-rose)" />

  <!-- Smallest accent, upper area -->
  <ellipse cx="210" cy="120" rx="52" ry="48" fill="url(#s-peach)" />

</svg>
